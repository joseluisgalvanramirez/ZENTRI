<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tus resultados - Zentri Vocacional</title>
    <link rel="stylesheet" href="vocacional-styles.css">
    <link rel="stylesheet" href="assistant.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .resultados-page {
            padding-top: 80px;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .resultados-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
        }

        .resultado-card {
            background: white;
            border-radius: 30px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .perfil-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .perfil-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            animation: bounce 2s infinite;
        }

        .perfil-titulo {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4158D0, #C850C0);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .perfil-descripcion {
            font-size: 1.2rem;
            color: #666;
            max-width: 600px;
            margin: 0 auto;
        }

        .puntajes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin: 3rem 0;
        }

        .puntaje-item {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 15px;
        }

        .puntaje-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .puntaje-nombre {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .puntaje-valor {
            color: #4158D0;
            font-weight: 700;
        }

        .puntaje-barra {
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }

        .puntaje-fill {
            height: 100%;
            background: linear-gradient(90deg, #4158D0, #C850C0);
            transition: width 1s ease;
        }

        .recomendaciones-section {
            margin-top: 3rem;
        }

        .recomendaciones-section h2 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            color: #333;
        }

        .carreras-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .carrera-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .carrera-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border-color: #4158D0;
        }

        .carrera-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .carrera-nombre {
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
        }

        .recomendacion-badge {
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .recomendacion-badge.alto {
            background: #4CAF50;
            color: white;
        }

        .recomendacion-badge.medio {
            background: #FFA500;
            color: white;
        }

        .carrera-descripcion {
            color: #666;
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .carrera-metadata {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: #888;
        }

        .carrera-area {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .acciones {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 3rem;
        }

        .btn-secundario {
            background: white;
            color: #4158D0;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            border: 2px solid #4158D0;
            transition: all 0.3s;
        }

        .btn-secundario:hover {
            background: #4158D0;
            color: white;
        }

        .guardar-resultados {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin: 2rem auto;
        }

        .guardar-resultados:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(40, 167, 69, 0.3);
        }

        .alerta-temporal {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .alerta-temporal .btn-pequeno {
            background: #4158D0;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .loading {
            text-align: center;
            padding: 4rem;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #4158D0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 2rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-resultados {
            text-align: center;
            padding: 4rem;
        }

        .no-resultados h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .no-resultados p {
            color: #666;
            margin-bottom: 2rem;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-contenido {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            max-width: 400px;
            text-align: center;
        }

        .modal-contenido h3 {
            margin-bottom: 1rem;
            color: #333;
        }

        .modal-contenido p {
            margin-bottom: 1.5rem;
            color: #666;
        }

        .modal-contenido .btn-modal {
            background: #4158D0;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            margin: 0 0.5rem;
        }

        .modal-contenido .btn-modal.secundario {
            background: #6c757d;
        }
    </style>
</head>
<body>
    <nav class="vocacional-nav">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">🎯</span>
                ZENTRI <span class="logo-light">Vocacional</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="test-vocacional.html">Test Vocacional</a>
                <a href="carreras.html">Carreras</a>
                <a href="perfil.html" id="nav-perfil-link">Mi Perfil</a>
                <a href="login.html" id="nav-login-link">Iniciar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="resultados-page">
        <div class="resultados-container">
            <div class="resultado-card" id="resultados-container">
                <div class="loading">
                    <div class="spinner"></div>
                    <h3>Cargando tus resultados...</h3>
                </div>
            </div>
        </div>
    </div>

    <div class="assistant-container" id="assistant-container"></div>

    <!-- Modal para guardar resultados -->
    <div id="guardar-modal" style="display: none;"></div>

    <script src="carreras-database.js"></script>
    <script src="auth.js"></script>
    <script src="vocacional-ai.js"></script>
    <script src="assistant-ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            mostrarResultados();
        });

        function mostrarResultados() {
            const tempData = sessionStorage.getItem('resultados_temp');
            
            if (!tempData) {
                document.getElementById('resultados-container').innerHTML = `
                    <div class="no-resultados">
                        <div style="font-size: 4rem; margin-bottom: 2rem;">😕</div>
                        <h2>No hay resultados para mostrar</h2>
                        <p>Realiza el test vocacional para ver tus recomendaciones personalizadas.</p>
                        <a href="test-vocacional.html" class="btn-hero-primary" style="margin-top: 2rem;">
                            Realizar test ahora
                        </a>
                    </div>
                `;
                return;
            }

            const data = JSON.parse(tempData);
            const perfil = data.perfil;
            const recomendaciones = data.recomendaciones;
            
            window.vocacionalAI.perfilUsuario = perfil;
            window.vocacionalAI.recomendaciones = recomendaciones;

            const perfilInfo = window.PERFILES_VOCACIONALES[perfil.principal] || {
                nombre: "Personalizado",
                descripcion: "Perfil único determinado por IA",
                icono: "🎯"
            };

            const puntajesOrdenados = Object.entries(perfil.puntajes)
                .sort((a, b) => b[1] - a[1]);

            let puntajesHTML = '';
            puntajesOrdenados.forEach(([tipo, puntaje]) => {
                const nombrePerfil = window.PERFILES_VOCACIONALES[tipo]?.nombre || tipo;
                puntajesHTML += `
                    <div class="puntaje-item">
                        <div class="puntaje-header">
                            <span class="puntaje-nombre">${nombrePerfil}</span>
                            <span class="puntaje-valor">${puntaje}%</span>
                        </div>
                        <div class="puntaje-barra">
                            <div class="puntaje-fill" style="width: ${puntaje}%"></div>
                        </div>
                    </div>
                `;
            });

            let carrerasHTML = '';
            recomendaciones.slice(0, 6).forEach(carrera => {
                carrerasHTML += `
                    <div class="carrera-card" onclick="verDetalleCarrera('${carrera.id}')">
                        <div class="carrera-header">
                            <span class="carrera-nombre">${carrera.nombre}</span>
                            <span class="recomendacion-badge ${carrera.nivel_recomendacion}">
                                ${carrera.nivel_recomendacion === 'alto' ? '⭐ Alta' : '📌 Media'}
                            </span>
                        </div>
                        <p class="carrera-descripcion">${carrera.descripcion.substring(0, 120)}...</p>
                        <div class="carrera-metadata">
                            <span>⏱️ ${carrera.duracion}</span>
                            <span>💰 ${carrera.salario_promedio}</span>
                        </div>
                        <div class="carrera-area" style="background: ${carrera.area_color}20; color: ${carrera.area_color};">
                            ${carrera.area_icono} ${carrera.area}
                        </div>
                    </div>
                `;
            });

            const haySesion = window.authSystem && window.authSystem.haySesion();
            
            let alertaGuardado = '';
            if (haySesion) {
                alertaGuardado = `
                    <div class="alerta-temporal" style="background: #d4edda; color: #155724; border-color: #c3e6cb;">
                        <span>✅ Has iniciado sesión como ${window.authSystem.getUsuarioActual().nombre}</span>
                        <button onclick="guardarResultadosEnCuenta()" class="btn-pequeno" style="background: #28a745;">
                            Guardar Resultados en mi Cuenta
                        </button>
                    </div>
                `;
            } else {
                alertaGuardado = `
                    <div class="alerta-temporal">
                        <span>⚠️ Estos resultados son temporales y desaparecerán al cerrar la página</span>
                        <button onclick="mostrarOpcionesGuardado()" class="btn-pequeno">
                            Guardar Resultados
                        </button>
                    </div>
                `;
            }

            const container = document.getElementById('resultados-container');
            container.innerHTML = `
                ${alertaGuardado}
                
                <div class="perfil-header">
                    <div class="perfil-icon">${perfilInfo.icono}</div>
                    <h1 class="perfil-titulo">Perfil ${perfilInfo.nombre}</h1>
                    <p class="perfil-descripcion">${perfilInfo.descripcion}</p>
                </div>

                <h2 style="text-align: center; margin: 2rem 0;">Tus áreas de fortaleza</h2>
                <div class="puntajes-grid">
                    ${puntajesHTML}
                </div>

                <div class="recomendaciones-section">
                    <h2>🎓 Carreras recomendadas para ti</h2>
                    <div class="carreras-grid">
                        ${carrerasHTML}
                    </div>
                </div>

                <div style="text-align: center; margin: 2rem 0;">
                    <button onclick="window.location.href='test-vocacional.html'" class="btn-hero-primary">
                        Reintentar test
                    </button>
                </div>
            `;
        }

        function verDetalleCarrera(id) {
            window.location.href = `carreras.html?detalle=${id}`;
        }

        function mostrarOpcionesGuardado() {
            const modal = document.getElementById('guardar-modal');
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-overlay">
                    <div class="modal-contenido">
                        <h3>🔒 Guardar tus resultados</h3>
                        <p>Para guardar tus resultados permanentemente y poder verlos después, necesitas:</p>
                        <div style="display: flex; gap: 1rem; justify-content: center; margin: 2rem 0;">
                            <a href="login.html?redirect=resultados" class="btn-modal">Iniciar Sesión</a>
                            <a href="login.html?redirect=resultados&tab=register" class="btn-modal secundario">Registrarme</a>
                        </div>
                        <button onclick="cerrarModal()" style="background: none; border: none; color: #666; cursor: pointer; margin-top: 1rem;">
                            Seguir viendo resultados temporales
                        </button>
                    </div>
                </div>
            `;
        }

        function guardarResultadosEnCuenta() {
            if (window.authSystem && window.authSystem.haySesion()) {
                const tempData = sessionStorage.getItem('resultados_temp');
                if (tempData) {
                    const data = JSON.parse(tempData);
                    window.authSystem.guardarResultadosUsuario(data.perfil);
                    
                    sessionStorage.removeItem('resultados_temp');
                    
                    alert('✅ Resultados guardados permanentemente en tu cuenta');
                    
                    window.location.reload();
                }
            }
        }

        function cerrarModal() {
            document.getElementById('guardar-modal').style.display = 'none';
        }

        window.addEventListener('authChange', function(e) {
            if (e.detail.sesionActiva) {
                window.location.reload();
            }
        });
    </script>
</body>
</html>
