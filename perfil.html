<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Perfil</title>

<style>
    .volver-inicio{
    text-align:center;
    margin-bottom:20px;
}

.btn-volver{
    display:inline-block;
    padding:10px 20px;
    background:linear-gradient(135deg,#6C63FF,#5A54E0);
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:15px;
    font-weight:500;
    transition:all 0.3s ease;
}

.btn-volver:hover{
    background:linear-gradient(135deg,#5A54E0,#4742C5);
    transform:translateY(-2px);
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

body{
font-family:Arial;
background:linear-gradient(135deg,#6C63FF,#3F3D56);
margin:0;
padding:0;
}

.container{
width:800px;
margin:auto;
margin-top:50px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
text-align:center;
}

.perfil-card{
background:#f4f4f4;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.historial-card{
background:#fafafa;
border-left:5px solid #6C63FF;
padding:15px;
margin-bottom:10px;
border-radius:5px;
}

button{
padding:10px 20px;
background:#6C63FF;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#5148d6;
}

</style>

</head>

<body>

<div class="container">

<h1>Perfil de Usuario</h1>

<div class="perfil-card" id="perfil"></div>

<h2>Historial de Test</h2>

<div id="historial"></div>

<br>

<button onclick="cerrarSesion()">Cerrar sesión</button>
<div class="contenedor">
    
    <!-- Botón para volver al inicio -->
    <div class="volver-inicio">
        <a href="index.html" class="btn-volver">Volver al Inicio</a>
    </div>

</div>

<script src="js/auth.js"></script>

<script>

if(!authSystem.haySesion()){
window.location.href="login.html"
}

const usuario=authSystem.getUsuarioActual()

document.getElementById("perfil").innerHTML=
`
<p><b>Nombre:</b> ${usuario.nombre}</p>
<p><b>Email:</b> ${usuario.email}</p>
`

const historial = authSystem.getResultadosUsuario()

let html=""

if(!historial || historial.length === 0){

html="<p>No has realizado ningún test todavía.</p>"

}else{

// 🔹 cantidad de test realizados
html += `<p><b>Tests realizados:</b> ${historial.length}</p><br>`

historial.forEach(test=>{

let perfil = test.resultado?.perfil || "No disponible"
let carrera = test.resultado?.recomendacion || "No disponible"

html+=`
<div class="historial-card">

<p><b>Fecha:</b> ${test.fecha}</p>

<p><b>Perfil:</b> ${perfil}</p>

<p><b>Carrera recomendada:</b> ${carrera}</p>

</div>
`

})

}

document.getElementById("historial").innerHTML = html
function cerrarSesion(){
authSystem.logout()
}

</script>
</div>


</body>

</html>
